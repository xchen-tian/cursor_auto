<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Chat View — Cursor Auto</title>
  <meta name="theme-color" content="#222" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <style>
    * { box-sizing: border-box; }
    html { overflow:hidden; }
    body { display:flex; flex-direction:column; height:100vh; height:100dvh; margin:0; background:#181818; color:#e4e4e4;
           font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; font-size:14px; overflow:hidden; }
    a { color:#5b9bf0; }

    #topBar { flex-shrink:0; display:flex; align-items:center; gap:10px; padding:0 12px; height:40px;
              background:#222; border-bottom:1px solid #333; font-size:13px; overflow-x:auto; white-space:nowrap; }
    #topBar button, #topBar select { padding:4px 10px; border-radius:6px; border:1px solid #555; background:#333;
                                     color:#ddd; cursor:pointer; font-size:12px; }
    #topBar button:hover { background:#444; }
    #winBar { flex-shrink:0; display:flex; gap:0; background:#1a1a1a; border-bottom:1px solid #333;
              overflow-x:auto; scrollbar-width:thin; min-height:0; }
    #winBar:empty { display:none; }
    .win-btn { flex-shrink:0; padding:5px 14px; border:none; border-bottom:2px solid transparent;
               background:transparent; color:#777; cursor:pointer; font-size:12px; white-space:nowrap;
               display:flex; align-items:center; gap:5px; }
    .win-btn:hover { color:#ccc; background:#252525; }
    .win-btn.active { color:#ddd; border-bottom-color:#5b9bf0; background:#222; }
    .win-btn .wdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; background:#555; }
    .win-btn .wdot[data-st="scanning"] { background:#e53935; }
    .win-btn .wdot[data-st="shimmer"] { background:#fb8c00; }
    .win-btn .wdot[data-st="clicked"],.win-btn .wdot[data-st="generating"] { background:#43a047; }
    .win-btn .wdot[data-st="paused"] { background:#90a4ae; }

    #tabBar { flex-shrink:0; display:flex; gap:0; background:#222; border-bottom:1px solid #333;
              overflow-x:auto; scrollbar-width:thin; min-height:36px; }
    .tab-btn { flex-shrink:0; padding:8px 10px 8px 16px; border:none; border-bottom:2px solid transparent;
               background:transparent; color:#888; cursor:pointer; font-size:13px; white-space:nowrap;
               max-width:200px; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:4px; }
    .tab-btn:hover { color:#ccc; background:#2a2a2a; }
    .tab-btn.active { color:#fff; border-bottom-color:#3b7dd8; }
    .tab-close { display:none; width:16px; height:16px; border-radius:4px; border:none; background:transparent;
                 color:#666; cursor:pointer; font-size:14px; line-height:16px; text-align:center; padding:0; flex-shrink:0; }
    .tab-btn:hover .tab-close { display:inline-block; }
    .tab-close:hover { background:#444; color:#eee; }
    #btnNewChat { flex-shrink:0; padding:4px 14px; border:none; border-bottom:2px solid transparent;
                  background:transparent; color:#888; cursor:pointer; font-size:18px; line-height:36px; }
    #btnNewChat:hover { color:#fff; background:#2a2a2a; }

    #chatFrame { flex:1; min-height:0; overflow:hidden; }

    #promptArea { flex-shrink:0; border-top:1px solid #333; background:#1e1e1e; z-index:10; }
    #promptInner { display:flex; gap:8px; max-width:min(900px,100%); margin:0 auto; padding:8px 12px; align-items:flex-end; }
    #promptInput { flex:1; resize:vertical; background:#252525; color:#e4e4e4; border:1px solid #444;
                   border-radius:10px; padding:8px 10px; font:14px/1.4 system-ui,-apple-system,sans-serif;
                   min-height:38px; max-height:200px; outline:none; }
    #promptInput:focus { border-color:#3b7dd8; }
    #btnSend { align-self:flex-end; width:38px; height:38px; border-radius:10px; border:1px solid #3b7dd8;
               background:#2a3a55; color:#ddd; cursor:pointer; font-size:18px; line-height:1; padding:0;
               display:flex; align-items:center; justify-content:center; }
    #btnSend:hover { background:#3b5588; }
    #btnSend:disabled { opacity:.4; cursor:default; }
    #btnStop { align-self:flex-end; width:38px; height:38px; border-radius:10px; border:1px solid #e53935;
               background:#3a1a1a; color:#f88; cursor:pointer; font-size:16px; line-height:1; padding:0;
               display:none; align-items:center; justify-content:center; }
    #btnStop:hover { background:#4a2020; }
    #btnStop.visible { display:flex; }
    #sendStatus { font-size:11px; color:#888; align-self:center; white-space:nowrap; }

    #statusBar { flex-shrink:0; height:24px; display:flex; align-items:center; padding:0 12px;
                 background:#222; border-top:1px solid #333; font-size:11px; color:#777; }

    @keyframes axSpin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    #axMini { display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:6px;
              border:1px solid rgba(158,158,158,0.25); background:rgba(158,158,158,0.1); cursor:pointer; white-space:nowrap; }
    #axMini .dot { width:10px; height:10px; border-radius:50%; border:2px solid rgba(255,255,255,0.12);
                   border-top-color:#9e9e9e; animation:axSpin 1.5s linear infinite; flex-shrink:0; box-sizing:border-box; }
    #axMini .lbl { font-size:11px; color:#aaa; max-width:100px; overflow:hidden; text-overflow:ellipsis; }
    #axMini[data-st="scanning"] { border-color:rgba(229,57,53,0.3); background:rgba(229,57,53,0.1); }
    #axMini[data-st="scanning"] .dot { border-top-color:#e53935; animation-duration:1s; }
    #axMini[data-st="shimmer"] { border-color:rgba(251,140,0,0.3); background:rgba(251,140,0,0.1); }
    #axMini[data-st="shimmer"] .dot { border-top-color:#fb8c00; animation-duration:.8s; }
    #axMini[data-st="clicked"],#axMini[data-st="generating"] { border-color:rgba(67,160,71,0.3); background:rgba(67,160,71,0.1); }
    #axMini[data-st="clicked"] .dot,#axMini[data-st="generating"] .dot { border-top-color:#43a047; animation-duration:.6s; }
    #axMini[data-st="paused"] { border-color:rgba(120,144,156,0.3); background:rgba(120,144,156,0.1); }
    #axMini[data-st="paused"] .dot { border-top-color:#90a4ae; animation:none; }
    #axMini[data-st="stopped"] { border-color:rgba(158,158,158,0.2); background:rgba(158,158,158,0.05); }
    #axMini[data-st="stopped"] .dot { border-top-color:#666; animation:none; }
  </style>
</head>
<body>
  <div id="topBar">
    <a href="/" style="text-decoration:none;color:#999;font-size:13px">&lt; Dashboard</a>
    <strong>Chat View</strong>
    <label style="color:#999">Refresh
      <select id="refreshSec">
        <option value="1">1s</option>
        <option value="2">2s</option>
        <option value="3" selected>3s</option>
        <option value="5">5s</option>
        <option value="0">Manual</option>
      </select>
    </label>
    <button id="btnRefresh">Refresh Now</button>
    <span id="axMini" data-st="stopped" title="Auto Click status"><span class="dot"></span><span class="lbl" id="axMiniLbl">--</span></span>
  </div>

  <div id="winBar"></div>
  <div id="tabBar" style="display:flex;align-items:stretch"></div>

  <iframe id="chatFrame" style="flex:1;min-height:0;border:none;width:100%;"></iframe>

  <div id="promptArea">
    <div id="promptInner">
      <textarea id="promptInput" rows="2" placeholder="Enter to send, Shift+Enter for newline"></textarea>
      <button id="btnStop" title="Stop generating">&#x25A0;</button>
      <button id="btnSend" title="Send (Enter)">&#x2191;</button>
      <span id="sendStatus"></span>
    </div>
  </div>

  <div id="statusBar"><span id="statusText">Loading...</span></div>

<script>
(function() {
  const tabBarEl = document.getElementById('tabBar');
  const chatFrame = document.getElementById('chatFrame');
  const promptInput = document.getElementById('promptInput');
  const btnSend = document.getElementById('btnSend');
  const btnStop = document.getElementById('btnStop');
  const sendStatus = document.getElementById('sendStatus');
  const statusText = document.getElementById('statusText');
  const refreshSecSel = document.getElementById('refreshSec');

  const winBarEl = document.getElementById('winBar');
  let selectedTargetId = '';
  let knownWindows = [];

  let currentTab = -1;
  let tabs = [];
  let cachedStyles = '';
  let cachedStylesHash = '';
  let refreshTimer = null;
  let sending = false;
  let inflight = false;

  const scrollAnchors = new Map();

  // --- Window selector ---
  function renderWindowBar() {
    winBarEl.innerHTML = '';
    if (knownWindows.length <= 1) return;
    for (const w of knownWindows) {
      const btn = document.createElement('button');
      btn.className = 'win-btn' + (w.targetId === selectedTargetId ? ' active' : '');
      const dot = document.createElement('span');
      dot.className = 'wdot';
      const ind = w.indicator || {};
      if (ind.exists && ind.hbAgeMs < 15000) dot.dataset.st = ind.state || '';
      btn.appendChild(dot);
      btn.appendChild(document.createTextNode(w.project));
      btn.onclick = () => switchWindow(w.targetId);
      winBarEl.appendChild(btn);
    }
  }

  function switchWindow(targetId) {
    if (targetId === selectedTargetId) return;
    saveScrollAnchor();
    saveDraft();
    selectedTargetId = targetId;
    currentTab = -1;
    tabs = [];
    cachedStyles = '';
    cachedStylesHash = '';
    frameInitialized = false;
    scrollAnchors.clear();
    renderWindowBar();
    tabBarEl.innerHTML = '';
    loadTabs().then(scheduleRefresh);
  }

  async function refreshWindows() {
    try {
      const r = await fetchJson('/api/windows');
      if (!r.ok || !r.windows) return;
      knownWindows = r.windows;
      if (!selectedTargetId && knownWindows.length > 0) {
        selectedTargetId = knownWindows[0].targetId;
      }
      if (selectedTargetId && !knownWindows.find(w => w.targetId === selectedTargetId)) {
        selectedTargetId = knownWindows.length > 0 ? knownWindows[0].targetId : '';
      }
      renderWindowBar();
    } catch {}
  }

  const RESPONSIVE_CSS = `
    html, body { margin:0; padding:0; background:#181818; overflow-x:hidden; overflow-y:auto; height:auto;
                 width:100%;
                 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; user-select:auto; }
    #cv-root { width:min(900px,100%); margin:0 auto; padding:clamp(10px,2.5vw,18px); padding-bottom:40px;
               overflow-x:hidden; }
    #cv-root * { box-sizing:border-box; }
    #cv-root [style*="max-width"] { max-width:100%!important; width:100%!important; }
    #cv-root .composer-human-message,
    #cv-root .composer-rendered-message,
    #cv-root .composer-human-ai-pair-container,
    #cv-root .composer-human-message-container,
    #cv-root .composer-code-block-container { width:100%!important; max-width:100%!important; }
    /* Monaco scrollbar remnants (server strips most, this catches CSS-based ones) */
    #cv-root .monaco-scrollable-element > .scrollbar { display:none!important; }
    .markdown-section { overflow-wrap:anywhere; word-break:break-word; }
    pre { max-width:100%; overflow-x:auto; }
    table { display:block; max-width:100%; overflow-x:auto; }
    img, svg { max-width:100%; height:auto; }
  `;

  function authHeaders() {
    const t = new URLSearchParams(location.search).get('token') || '';
    return t ? { 'x-token': t } : {};
  }
  async function fetchJson(url) {
    return (await fetch(url, { headers: authHeaders() })).json();
  }
  async function postJson(url, body) {
    return (await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify(body),
    })).json();
  }

  // --- Tabs ---
  async function loadTabs() {
    try {
      const tqs = selectedTargetId ? '?targetId=' + selectedTargetId : '';
      const r = await fetchJson('/api/chat-tabs' + tqs);
      if (!r.ok) { statusText.textContent = 'Error: ' + (r.error || ''); return; }
      tabs = r.tabs || [];
      const selectedIdx = tabs.findIndex(t => t.selected);
      if (currentTab < 0) currentTab = selectedIdx >= 0 ? selectedIdx : 0;
      renderTabs();
      restoreDraft();
      doRefresh(false);
    } catch (e) {
      statusText.textContent = 'Error loading tabs';
    }
  }

  function renderTabs() {
    tabBarEl.innerHTML = '';
    tabs.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === currentTab ? ' active' : '');
      const labelSpan = document.createElement('span');
      labelSpan.textContent = t.title || t.label || '(untitled)';
      labelSpan.style.cssText = 'overflow:hidden;text-overflow:ellipsis';
      btn.appendChild(labelSpan);
      btn.title = t.title || t.label || '';
      btn.onclick = (e) => { if (!e.target.classList.contains('tab-close')) switchTab(i); };

      if (tabs.length > 1) {
        const closeBtn = document.createElement('span');
        closeBtn.className = 'tab-close';
        closeBtn.textContent = '\u00D7';
        closeBtn.title = 'Close tab';
        closeBtn.onclick = (e) => { e.stopPropagation(); closeTab(i); };
        btn.appendChild(closeBtn);
      }

      tabBarEl.appendChild(btn);
    });
    const addBtn = document.createElement('button');
    addBtn.id = 'btnNewChat';
    addBtn.textContent = '+';
    addBtn.title = 'New Chat';
    addBtn.onclick = newChat;
    tabBarEl.appendChild(addBtn);
  }

  async function closeTab(idx) {
    if (tabs.length <= 1) return;
    const label = tabs[idx]?.title || tabs[idx]?.label || '';
    statusText.textContent = 'Closing "' + label.substring(0, 30) + '"...';
    try {
      const body = { tabIndex: idx };
      if (selectedTargetId) body.targetId = selectedTargetId;
      const r = await postJson('/api/chat-tab/close', body);
      if (r.ok) {
        if (idx === currentTab) {
          currentTab = Math.max(0, idx - 1);
        } else if (idx < currentTab) {
          currentTab--;
        }
        await new Promise(res => setTimeout(res, 500));
        await loadTabs();
        statusText.textContent = 'Closed "' + (r.closedTab || label).substring(0, 30) + '"';
      } else {
        statusText.textContent = 'Close failed: ' + (r.reason || r.error || 'unknown');
      }
    } catch (e) {
      statusText.textContent = 'Close error: ' + String(e.message || e);
    }
  }

  async function newChat() {
    statusText.textContent = 'Creating new chat...';
    try {
      const r = await postJson('/api/composer/new-chat', {});
      if (r.ok) {
        await new Promise(res => setTimeout(res, 1000));
        await loadTabs();
        statusText.textContent = 'New chat created';
      } else {
        statusText.textContent = 'Error: ' + (r.reason || r.error || 'unknown');
      }
    } catch (e) {
      statusText.textContent = 'Error: ' + String(e.message || e);
    }
  }

  let pendingSwitch = false;
  let pendingSwitchIdx = -1;

  function switchTab(idx) {
    if (idx === currentTab) return;
    saveScrollAnchor();
    saveDraft();
    currentTab = idx;
    renderTabs();
    restoreDraft();
    if (inflight) {
      pendingSwitch = true;
      pendingSwitchIdx = idx;
    } else {
      doRefresh(true);
    }
  }

  // --- Scroll anchor (operates on iframe's document) ---
  function getFrameDoc() {
    try { return chatFrame.contentDocument; } catch { return null; }
  }

  function getPath(el, root) {
    const path = [];
    let node = el;
    while (node && node !== root && node.parentElement) {
      path.unshift(Array.prototype.indexOf.call(node.parentElement.children, node));
      node = node.parentElement;
    }
    return path;
  }
  function getByPath(root, path) {
    let node = root;
    for (const idx of path) {
      if (!node || !node.children || !node.children[idx]) return null;
      node = node.children[idx];
    }
    return node;
  }

  function saveScrollAnchor() {
    if (currentTab < 0) return;
    const doc = getFrameDoc();
    if (!doc) return;
    const body = doc.documentElement;
    const scrollTop = body.scrollTop || doc.body?.scrollTop || 0;
    const scrollH = body.scrollHeight || doc.body?.scrollHeight || 0;
    const clientH = body.clientHeight || doc.body?.clientHeight || 0;
    const key = 'tab:' + currentTab;
    const atBottom = scrollH - scrollTop - clientH < 80;
    if (atBottom) { scrollAnchors.set(key, { stickToBottom: true }); return; }
    const root = doc.getElementById('cv-root');
    if (root) {
      const pairs = root.querySelectorAll('.composer-human-ai-pair-container');
      for (const p of pairs) {
        if (p.getBoundingClientRect().bottom > 0) {
          scrollAnchors.set(key, { path: getPath(p, root), offset: -p.getBoundingClientRect().top });
          return;
        }
      }
    }
    scrollAnchors.set(key, { scrollTop });
  }

  function restoreScrollAnchor() {
    const doc = getFrameDoc();
    if (!doc) return;
    const key = 'tab:' + currentTab;
    const anchor = scrollAnchors.get(key);
    const setScroll = (v) => { doc.documentElement.scrollTop = v; if (doc.body) doc.body.scrollTop = v; };
    if (!anchor || anchor.stickToBottom) {
      setScroll(doc.documentElement.scrollHeight);
      return;
    }
    if (anchor.path) {
      const root = doc.getElementById('cv-root');
      const el = root ? getByPath(root, anchor.path) : null;
      if (el) {
        el.scrollIntoView({ block: 'start' });
        const cur = doc.documentElement.scrollTop || doc.body?.scrollTop || 0;
        setScroll(cur + (anchor.offset || 0));
        return;
      }
    }
    if (anchor.scrollTop != null) setScroll(anchor.scrollTop);
  }

  // --- Draft ---
  function draftKey() { return 'chatview-draft:tab:' + currentTab; }
  function saveDraft() { if (currentTab < 0) return; const t = promptInput.value; t ? localStorage.setItem(draftKey(), t) : localStorage.removeItem(draftKey()); }
  function restoreDraft() { promptInput.value = localStorage.getItem(draftKey()) || ''; }
  promptInput.addEventListener('input', () => { if (currentTab >= 0) localStorage.setItem(draftKey(), promptInput.value); });

  // --- Write content into iframe (single frame, CSS isolation) ---
  let cachedThemeInfo = null;
  let frameInitialized = false;

  function stripLayout(s) {
    return (s || '')
      .replace(/overflow\s*:\s*hidden\s*;?/g, '')
      .replace(/height\s*:\s*\d+(\.\d+)?px\s*;?/g, '')
      .replace(/width\s*:\s*\d+(\.\d+)?px\s*;?/g, '');
  }

  function initFrame(styles, themeInfo) {
    const doc = getFrameDoc();
    if (!doc) return;
    const hc = themeInfo?.htmlClass || '';
    const bc = themeInfo?.bodyClass || '';
    const hs = stripLayout(themeInfo?.htmlStyle);
    const bs = stripLayout(themeInfo?.bodyStyle);
    const ws = stripLayout(themeInfo?.wbStyle);
    doc.open();
    doc.write('<!doctype html><html class="' + hc + '" style="' + hs + '"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">');
    if (styles) doc.write('<style id="cs">' + styles + '</style>');
    doc.write('<style>' + RESPONSIVE_CSS + '</style>');
    doc.write('</head><body class="' + bc + '" style="' + bs + '"><div id="cv-root" class="monaco-workbench" style="' + ws + '"></div></body></html>');
    doc.close();
    frameInitialized = true;
  }

  function updateContent(html) {
    const doc = getFrameDoc();
    if (!doc) return;
    const root = doc.getElementById('cv-root');
    if (root) root.innerHTML = html || '<div style="text-align:center;color:#666;padding:60px 20px">No messages</div>';
  }


  // --- Refresh ---
  async function doRefresh(isSwitch) {
    if (inflight) return;
    inflight = true;

    const qs = new URLSearchParams();
    if (isSwitch && currentTab >= 0) qs.set('tab', String(currentTab));
    const needStyles = !cachedStyles;
    if (needStyles) qs.set('needStyles', '1');
    else if (cachedStylesHash) qs.set('stylesHash', cachedStylesHash);
    if (selectedTargetId) qs.set('targetId', selectedTargetId);

    try {
      if (!isSwitch) saveScrollAnchor();

      const tabsQs = selectedTargetId ? '?targetId=' + selectedTargetId : '';
      const [contentR, tabsR] = await Promise.all([
        fetchJson('/api/chat-content?' + qs.toString()),
        isSwitch ? null : fetchJson('/api/chat-tabs' + tabsQs).catch(() => null),
      ]);

      if (tabsR && tabsR.ok) {
        tabs = tabsR.tabs || [];
        if (!pendingSwitch) {
          const cursorSelected = tabs.findIndex(t => t.selected);
          if (cursorSelected >= 0 && cursorSelected !== currentTab) {
            saveDraft(); currentTab = cursorSelected; restoreDraft();
          }
        }
        renderTabs();
      }

      if (!contentR.ok) { statusText.textContent = 'Error: ' + (contentR.error || ''); inflight = false; return; }

      if (contentR.styles != null) { cachedStyles = contentR.styles; cachedStylesHash = contentR.stylesHash || ''; }
      if (contentR.stylesHash) cachedStylesHash = contentR.stylesHash;
      if (contentR.themeInfo) cachedThemeInfo = contentR.themeInfo;

      // Toggle Send/Stop mode based on composer status
      const cs = contentR.composerStatus;
      const canStop = cs && (cs.hasStopButton || cs.status === 'generating');
      btnStop.classList.toggle('visible', !!canStop);

      if (!frameInitialized) {
        initFrame(cachedStyles, cachedThemeInfo);
      }
      updateContent(contentR.html);
      restoreScrollAnchor();

      statusText.textContent = tabs.length + ' tab(s) \u00B7 ' +
        new Date().toLocaleTimeString() + ' (' + ((contentR.html || '').length / 1024 | 0) + 'KB)';
    } catch (e) {
      statusText.textContent = 'Refresh error: ' + String(e.message || e);
    }
    inflight = false;
    if (pendingSwitch) {
      pendingSwitch = false;
      currentTab = pendingSwitchIdx;
      renderTabs();
      doRefresh(true);
    }
  }

  function scheduleRefresh() {
    if (refreshTimer) { clearTimeout(refreshTimer); refreshTimer = null; }
    const sec = Number(refreshSecSel.value);
    if (sec > 0 && !sending) {
      refreshTimer = setTimeout(() => { doRefresh(false).then(scheduleRefresh); }, sec * 1000);
    }
  }
  refreshSecSel.onchange = scheduleRefresh;
  document.getElementById('btnRefresh').onclick = () => doRefresh(false).then(scheduleRefresh);

  // --- Send ---
  async function doSend() {
    const text = promptInput.value.trim();
    if (!text || sending) return;
    sending = true; btnSend.disabled = true; sendStatus.textContent = 'sending...';
    try {
      const body = { text, append: false, send: true };
      if (selectedTargetId) body.targetId = selectedTargetId;
      const r = await postJson('/api/composer/insert', body);
      if (r.ok) {
        promptInput.value = ''; localStorage.removeItem(draftKey());
        sendStatus.textContent = 'sent';
        scrollAnchors.set('tab:' + currentTab, { stickToBottom: true });
        await doRefresh(false);
        scheduleRefresh();
      } else { sendStatus.textContent = 'error: ' + (r.error || ''); }
    } catch { sendStatus.textContent = 'error'; }
    sending = false; btnSend.disabled = false;
    setTimeout(() => { if (sendStatus.textContent === 'sent') sendStatus.textContent = ''; }, 2000);
  }
  const STOP_SEL = '.send-with-mode .anysphere-icon-button[data-stop-button="true"]';

  btnSend.onclick = () => doSend();
  promptInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
  });

  btnStop.onclick = async () => {
    btnStop.disabled = true;
    try {
      const stopBody = { selector: STOP_SEL };
      if (selectedTargetId) stopBody.targetId = selectedTargetId;
      await postJson('/api/remote-click', stopBody);
      await doRefresh(false);
      scheduleRefresh();
    } catch {}
    btnStop.disabled = false;
  };

  // --- AX Status mini indicator ---
  const axMiniEl = document.getElementById('axMini');
  const axMiniLbl = document.getElementById('axMiniLbl');

  async function pollAxMini() {
    try {
      const axQs = selectedTargetId ? '?targetId=' + selectedTargetId : '';
      const r = await fetchJson('/api/click/status' + axQs);
      if (!r.ok) return;
      const ind = r.indicator || {};
      const alive = ind.exists && ind.hbAgeMs < 15000;
      const dead = ind.exists && ind.hbAgeMs >= 15000;
      let st, text;
      if (!ind.exists) { st = 'stopped'; text = 'AX off'; }
      else if (dead) { st = 'stopped'; text = 'AX dead'; }
      else { st = ind.state || 'init'; text = ind.label || ind.state || 'AX'; }
      axMiniEl.dataset.st = st;
      axMiniLbl.textContent = text;
      if (r.windows && r.windows.length > 1) {
        const active = r.windows.filter(w => w.indicator?.exists && w.indicator?.hbAgeMs < 15000);
        axMiniEl.title = active.map(w => w.project + ': ' + (w.indicator?.label || w.indicator?.state || '?')).join('\n') || 'Auto Click';
      }
    } catch {}
  }
  pollAxMini();
  setInterval(pollAxMini, 2000);

  // --- Init ---
  refreshWindows().then(() => loadTabs().then(scheduleRefresh));
  setInterval(refreshWindows, 8000);
})();
</script>
</body>
</html>
