<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Code Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1a1a2e; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; }

    #tabs {
      display: flex; gap: 0; flex-wrap: wrap; padding: 0 8px;
    }
    .tab {
      padding: 8px 16px; cursor: pointer; border: 1px solid transparent; border-bottom: none;
      border-radius: 8px 8px 0 0; background: #1e293b; font-size: 13px; font-weight: 500;
      color: #94a3b8; display: flex; align-items: center; gap: 6px; transition: background .15s;
      user-select: none; white-space: nowrap;
    }
    .tab:hover { background: #334155; }
    .tab.active { background: #1a1a2e; border-color: #0f3460; color: #e0e0e0; position: relative; }
    .tab.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: #1a1a2e; }
    .tab .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tab .approve-badge {
      background: #22c55e; color: #1a1a2e; font-size: 10px; font-weight: 700;
      min-width: 16px; height: 16px; line-height: 16px; text-align: center;
      border-radius: 8px; padding: 0 4px;
    }

    #btn-ax { font-weight: 700; min-width: 70px; text-align: center; }
    #btn-ax.on  { background: #166534; border-color: #22c55e; color: #bbf7d0; }
    #btn-ax.off { background: #7f1d1d; border-color: #ef4444; color: #fecaca; }

    #terminal-container { flex: 1; overflow: hidden; position: relative; }
    #terminal-container .xterm { height: 100%; }

    .term-panel {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; pointer-events: none;
    }
    .term-panel.active { opacity: 1; pointer-events: auto; }

    #scroll-indicator {
      display: none; position: absolute; bottom: 0; left: 0; right: 0;
      padding: 6px 16px; background: rgba(251, 140, 0, 0.92); color: #1a1a2e;
      font-size: 13px; font-weight: 600; text-align: center; z-index: 20;
      cursor: pointer; font-family: system-ui, -apple-system, sans-serif;
      border-top: 2px solid #e65100;
    }
    #scroll-indicator kbd {
      background: rgba(0,0,0,0.18); border-radius: 3px; padding: 1px 6px;
      font-family: inherit; font-size: 12px;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    .overlay {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; position: absolute; inset: 0; background: rgba(0,0,0,0.75); z-index: 10;
      font-size: 16px; color: #94a3b8;
    }
    .overlay.show { display: flex; }
    .overlay button {
      padding: 10px 28px; border-radius: 8px; font-size: 15px; font-weight: 600;
      border: 1px solid #22c55e; background: #166534; color: #bbf7d0; cursor: pointer;
    }
    .overlay button:hover { background: #15803d; }
    .overlay .sub { font-size: 13px; color: #64748b; }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;background:#16213e;border-bottom:1px solid #0f3460;">
      <div id="tabs" style="flex:1;"></div>
      <button id="btn-ax" class="on" style="margin:0 10px;">AX ●</button>
    </div>
    <div id="terminal-container">
      <div class="overlay show" id="overlay">
        <div id="overlay-msg">Loading...</div>
        <div style="display:flex;gap:12px;">
          <button id="btn-connect" style="display:none">Resume</button>
          <button id="btn-new" style="display:none;border-color:#64748b;background:#334155;color:#e2e8f0;">New Session</button>
        </div>
        <div class="sub" id="overlay-sub"></div>
      </div>
      <div id="scroll-indicator" onclick="exitScrollMode()"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.min.js"></script>
  <script>
    const THEME = {
      background: '#1a1a2e', foreground: '#e0e0e0', cursor: '#e0e0e0',
      selectionBackground: '#3b4261',
      black: '#1a1a2e', red: '#e53935', green: '#43a047', yellow: '#fb8c00',
      blue: '#1e88e5', magenta: '#8e24aa', cyan: '#00acc1', white: '#d4d4d4',
      brightBlack: '#757575', brightRed: '#ff5252', brightGreen: '#69f0ae',
      brightYellow: '#ffd740', brightBlue: '#448aff', brightMagenta: '#e040fb',
      brightCyan: '#18ffff', brightWhite: '#ffffff',
    };

    const PROMPT_PATTERNS = [
      /Do you want to\s+\w/i,
      /wants to\s+(create|run|execute|write|edit|read|delete|access|fetch|proceed)/i,
      /requires confirmation/i,
      /allow\s+(this|the|tool)/i,
      /\bYes\b[\s\S]{0,200}\bNo\b/,
    ];
    const DIALOG_COMPLETE_RE = /Esc to cancel|Tab to amend|ctrl\+e to explain/i;
    const RUNNING_RE = /esc to interrupt/;

    const APPROVE_COOLDOWN = 3000;
    const DEBOUNCE_MS = 200;

    // ---- DOM references ---------------------------------------------------

    const termContainer = document.getElementById('terminal-container');
    const tabsEl = document.getElementById('tabs');
    const btnAx = document.getElementById('btn-ax');
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlay-msg');
    const overlaySub = document.getElementById('overlay-sub');
    const btnConnect = document.getElementById('btn-connect');
    const btnNew = document.getElementById('btn-new');

    // ---- Global state -----------------------------------------------------

    let activeTabId = null;
    let globalWatchActive = true;
    let scrollMode = false;
    let scrollBuffer = [];
    let scrollBufferBytes = 0;
    let windowList = [];
    let projectList = [];

    // Expose active tab's xterm for console debugging
    Object.defineProperty(window, 'term', {
      get: () => { const t = getActiveTab(); return t ? t.term : null; },
    });

    // ---- Per-tab connection (each has its own xterm) ----------------------

    const tabConns = new Map();

    class TabConnection {
      constructor(tabId, win) {
        this.tabId = tabId;
        this.win = win;
        this.ws = null;
        this.sessionAlive = false;
        this.sessionQueried = false;
        this.sessionExists = false;
        this.approveCount = 0;
        this.lastApproveTs = 0;
        this.debounceTimer = null;
        this.reconnectTimer = null;
        this.reconnectDelay = 1000;

        this.panel = document.createElement('div');
        this.panel.className = 'term-panel';
        termContainer.appendChild(this.panel);

        this.term = new Terminal({
          theme: THEME,
          fontFamily: '"Cascadia Code", Consolas, Menlo, "DejaVu Sans Mono", monospace',
          fontSize: 14, cursorBlink: true, allowProposedApi: true,
        });
        this.fitAddon = new FitAddon.FitAddon();
        this.term.loadAddon(this.fitAddon);
        this.term.open(this.panel);
        this.fitAddon.fit();

        this.term.onData((data) => {
          if (this.tabId !== activeTabId || scrollMode) return;
          tabSend(this, { type: 'input', data });
        });

        this.term.attachCustomKeyEventHandler((e) => {
          if (this.tabId !== activeTabId) return true;
          if (!scrollMode) {
            if (e.type === 'keydown' && e.key === 'PageUp') {
              enterScrollMode();
              this.term.scrollPages(-1);
              return false;
            }
            return true;
          }
          if (e.type === 'keydown') {
            switch (e.key) {
              case 'Escape': case 'q': exitScrollMode(); return false;
              case 'ArrowUp': this.term.scrollLines(-1); return false;
              case 'ArrowDown': this.term.scrollLines(1); return false;
              case 'PageUp': this.term.scrollPages(-1); return false;
              case 'PageDown': this.term.scrollPages(1); return false;
              case 'Home': this.term.scrollToTop(); return false;
              case 'End': this.term.scrollToBottom(); return false;
            }
          }
          return false;
        });

        this.panel.addEventListener('wheel', (e) => {
          if (this.tabId !== activeTabId || scrollMode || e.deltaY >= 0) return;
          if (this.term.buffer.active.baseY > 0) enterScrollMode();
        }, { passive: true, capture: true });
      }

      getScreenLines() {
        const buf = this.term.buffer.active;
        const lines = [];
        const viewStart = Math.max(0, buf.length - this.term.rows);
        for (let i = 0; i < this.term.rows; i++) {
          const l = buf.getLine(viewStart + i);
          lines.push(l ? l.translateToString(true) : '');
        }
        return lines;
      }
    }

    // ---- Helpers ----------------------------------------------------------

    function tabSend(tab, msg) {
      if (tab.ws && tab.ws.readyState === 1) tab.ws.send(JSON.stringify(msg));
    }

    function getActiveTab() { return tabConns.get(activeTabId) || null; }

    function detectPrompt(text) {
      for (const re of PROMPT_PATTERNS) { if (re.test(text)) return true; }
      return false;
    }

    function parseWindowHost(title) {
      const m = title.match(/\[SSH:\s*([^\]]+)\]/);
      return m ? m[1].trim() : null;
    }

    function parseWindowProject(title) {
      const parts = title.split(' - ');
      if (parts.length >= 3) return parts[parts.length - 2].replace(/\s*\[SSH:.*\]/, '').trim();
      return parts[0];
    }

    function resolveProjectInfo(win) {
      const sshHost = parseWindowHost(win.title);
      const projectName = win.project || parseWindowProject(win.title);

      if (sshHost) {
        const match = projectList.find(p =>
          p.type === 'ssh' && p.host === sshHost && p.project === projectName
        ) || projectList.find(p =>
          p.type === 'ssh' && p.host === sshHost
        );
        if (match) return { sessionType: 'ssh', host: match.host, cwd: match.cwd };
        return { sessionType: 'ssh', host: sshHost, cwd: '~' };
      }

      const match = projectList.find(p =>
        p.type === 'local' && p.project === projectName
      ) || projectList.find(p =>
        p.type === 'local' && p.cwd.endsWith(projectName)
      );
      if (match) return { sessionType: 'local', host: null, cwd: match.cwd };
      return { sessionType: 'local', host: null, cwd: projectName };
    }

    function findYesRow(lines) {
      for (let i = 0; i < lines.length; i++) {
        if (/❯\s*\d+\.\s*Yes/.test(lines[i])) return i;
      }
      return -1;
    }

    function flashYesRow(tab, screenRow) {
      const s = tab.panel.querySelector('.xterm-screen');
      if (!s) return;
      const h = s.offsetHeight / tab.term.rows;
      s.style.position = 'relative';
      const bar = document.createElement('div');
      bar.style.cssText = `position:absolute;left:0;width:100%;top:${screenRow*h}px;height:${h}px;background:#22c55e;opacity:0;pointer-events:none;z-index:5;`;
      s.appendChild(bar);
      bar.style.opacity = '0.4';
      setTimeout(() => { bar.style.opacity = '0'; }, 120);
      setTimeout(() => { bar.style.opacity = '0.4'; }, 240);
      setTimeout(() => { bar.style.opacity = '0'; }, 360);
      setTimeout(() => { bar.remove(); }, 400);
    }

    // ---- Per-tab prompt detection & auto-approve --------------------------

    function checkTabApprove(tab) {
      if (!globalWatchActive || !tab.sessionAlive) return;
      if (tab.tabId === activeTabId && scrollMode) return;
      if (Date.now() - tab.lastApproveTs < APPROVE_COOLDOWN) return;

      const lines = tab.getScreenLines();
      const screen = lines.join('\n');

      if (RUNNING_RE.test(screen)) return;

      if (detectPrompt(screen) && DIALOG_COMPLETE_RE.test(screen)) {
        if (tab.debounceTimer) clearTimeout(tab.debounceTimer);
        tab.debounceTimer = setTimeout(() => {
          tab.debounceTimer = null;
          doTabApprove(tab);
        }, DEBOUNCE_MS);
      }
    }

    function doTabApprove(tab) {
      const lines = tab.getScreenLines();
      const screen = lines.join('\n');

      if (RUNNING_RE.test(screen)) return;
      if (!detectPrompt(screen)) return;

      tab.approveCount++;
      tab.lastApproveTs = Date.now();

      const isActive = tab.tabId === activeTabId;

      if (isActive) {
        const row = findYesRow(lines);
        if (row >= 0) flashYesRow(tab, row);
        btnAx.style.transition = 'none';
        btnAx.style.boxShadow = '0 0 12px 4px #22c55e';
        setTimeout(() => {
          btnAx.style.transition = 'box-shadow 0.5s';
          btnAx.style.boxShadow = 'none';
        }, 400);
        setTimeout(() => tabSend(tab, { type: 'approve' }), 400);
      } else {
        tabSend(tab, { type: 'approve' });
      }

      renderTabs();
    }

    // ---- WebSocket per tab ------------------------------------------------

    function openTabWs(tab) {
      if (tab.ws && (tab.ws.readyState === 0 || tab.ws.readyState === 1)) return;

      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/api/claude/ws`);
      ws.binaryType = 'arraybuffer';
      tab.ws = ws;

      ws.addEventListener('open', () => {
        tab.reconnectDelay = 1000;
        tab.sessionQueried = false;
        const info = resolveProjectInfo(tab.win);
        tabSend(tab, { type: 'query', ...info });
      });

      ws.addEventListener('message', (evt) => onTabMessage(tab, evt));

      ws.addEventListener('close', () => {
        tab.sessionAlive = false;
        if (tab.tabId === activeTabId) {
          showOverlay('Disconnected', 'Reconnect');
        }
        renderTabs();
        if (tab.reconnectTimer) clearTimeout(tab.reconnectTimer);
        tab.reconnectTimer = setTimeout(() => {
          tab.reconnectTimer = null;
          openTabWs(tab);
        }, tab.reconnectDelay);
        tab.reconnectDelay = Math.min(tab.reconnectDelay * 2, 30000);
      });

      ws.addEventListener('error', () => {});
    }

    function onTabMessage(tab, evt) {
      const isActive = tab.tabId === activeTabId;

      if (evt.data instanceof ArrayBuffer) {
        const ab = evt.data;
        const chunk = new Uint8Array(ab);

        if (isActive && scrollMode) {
          scrollBuffer.push(ab);
          scrollBufferBytes += ab.byteLength;
          updateScrollIndicator();
        } else {
          tab.term.write(chunk);
          if (isActive && !scrollMode) tab.term.scrollToBottom();
        }

        checkTabApprove(tab);
        return;
      }

      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }

      switch (msg.type) {
        case 'query_result':
          tab.sessionQueried = true;
          tab.sessionExists = msg.exists;
          if (msg.exists) {
            const info = resolveProjectInfo(tab.win);
            tabSend(tab, { type: 'attach', ...info });
          } else if (isActive) {
            showOverlay('No active session', 'Start Claude');
          }
          renderTabs();
          break;

        case 'session':
          tab.sessionAlive = true;
          if (msg.replay) tab.term.write('\x1B[2J\x1B[H');
          if (isActive) {
            hideOverlay();
            tabSend(tab, { type: 'resize', cols: tab.term.cols + 1, rows: tab.term.rows });
            setTimeout(() => {
              tabSend(tab, { type: 'resize', cols: tab.term.cols, rows: tab.term.rows });
              tab.term.focus();
            }, 80);
          }
          renderTabs();
          break;

        case 'exit':
          tab.sessionAlive = false;
          tab.sessionExists = false;
          if (isActive) {
            if (scrollMode) exitScrollMode();
            showOverlay(msg.reason === 'idle_timeout' ? 'Session timed out' : 'Session ended', 'Start Claude');
          }
          renderTabs();
          break;

        case 'error':
          if (isActive) {
            if (scrollMode) exitScrollMode();
            showOverlay(msg.message, 'Retry');
          }
          break;

        case 'no_session':
          tab.sessionAlive = false;
          tab.sessionExists = false;
          if (isActive) {
            if (scrollMode) exitScrollMode();
            showOverlay('Session expired', 'Start Claude');
          }
          renderTabs();
          break;
      }
    }

    function ensureTabWsReady(tab) {
      return new Promise((resolve, reject) => {
        if (tab.ws && tab.ws.readyState === 1) return resolve();
        const setup = () => {
          const cleanup = () => {
            tab.ws.removeEventListener('open', onOpen);
            tab.ws.removeEventListener('close', onClose);
          };
          const onOpen = () => { cleanup(); resolve(); };
          const onClose = () => { cleanup(); reject(new Error('WebSocket closed')); };
          tab.ws.addEventListener('open', onOpen);
          tab.ws.addEventListener('close', onClose);
        };
        if (tab.ws && tab.ws.readyState === 0) { setup(); return; }
        openTabWs(tab);
        setup();
      });
    }

    // ---- Tab rendering ----------------------------------------------------

    function renderTabs() {
      tabsEl.innerHTML = '';
      for (const [tabId, tab] of tabConns) {
        const el = document.createElement('div');
        el.className = 'tab' + (tabId === activeTabId ? ' active' : '');

        const dot = document.createElement('span');
        const host = parseWindowHost(tab.win.title);
        dot.className = 'dot';
        dot.style.background = tab.sessionAlive ? (host ? '#fb8c00' : '#22c55e') : '#64748b';
        el.appendChild(dot);

        const label = document.createElement('span');
        const proj = tab.win.project || parseWindowProject(tab.win.title);
        label.textContent = host ? `[${host}] ${proj}` : proj;
        el.appendChild(label);

        if (tab.approveCount > 0) {
          const badge = document.createElement('span');
          badge.className = 'approve-badge';
          badge.textContent = tab.approveCount;
          el.appendChild(badge);
        }

        el.onclick = () => selectTab(tabId);
        tabsEl.appendChild(el);
      }
    }

    // ---- Tab selection ----------------------------------------------------

    function selectTab(tabId) {
      if (scrollMode) exitScrollMode();

      activeTabId = tabId;

      for (const [id, t] of tabConns) {
        if (id === tabId) t.panel.classList.add('active');
        else t.panel.classList.remove('active');
      }

      const tab = tabConns.get(tabId);
      renderTabs();

      if (!tab) return;

      if (tab.sessionAlive) {
        hideOverlay();
        tab.term.focus();
      } else if (tab.sessionQueried) {
        showOverlay(
          tab.sessionExists ? 'Session active' : 'No active session',
          tab.sessionExists ? 'Reconnect' : 'Start Claude'
        );
      } else {
        showOverlay('Connecting...', '', false);
      }
    }

    // ---- Start / Attach sessions ------------------------------------------

    async function startActiveSession(newSession) {
      const tab = getActiveTab();
      if (!tab) return;

      hideOverlay();
      tab.term.reset();

      try {
        await ensureTabWsReady(tab);
      } catch {
        showOverlay('Connection failed', 'Retry');
        return;
      }

      const info = resolveProjectInfo(tab.win);
      tab.fitAddon.fit();
      tabSend(tab, { type: 'start', ...info, cols: tab.term.cols, rows: tab.term.rows, newSession: !!newSession });
    }

    async function attachActiveSession() {
      const tab = getActiveTab();
      if (!tab) return;

      hideOverlay();
      tab.term.reset();

      try {
        await ensureTabWsReady(tab);
      } catch {
        showOverlay('Connection failed', 'Retry');
        return;
      }

      const info = resolveProjectInfo(tab.win);
      tab.fitAddon.fit();
      tabSend(tab, { type: 'attach', ...info });
    }

    // ---- Overlay ----------------------------------------------------------

    function showOverlay(message, buttonLabel, showNew) {
      overlayMsg.textContent = message;
      btnConnect.textContent = buttonLabel || 'Resume';
      btnConnect.style.display = buttonLabel ? 'inline-block' : 'none';
      btnNew.style.display = showNew !== false ? 'inline-block' : 'none';
      overlay.classList.add('show');
    }

    function hideOverlay() {
      overlay.classList.remove('show');
    }

    // ---- AX button --------------------------------------------------------

    function updateAxButton() {
      btnAx.textContent = globalWatchActive ? 'AX \u25CF' : 'AX \u25A0';
      btnAx.className = globalWatchActive ? 'on' : 'off';
    }

    btnAx.addEventListener('click', () => {
      globalWatchActive = !globalWatchActive;
      updateAxButton();
      if (globalWatchActive) {
        for (const tab of tabConns.values()) {
          if (tab.sessionAlive) checkTabApprove(tab);
        }
      }
    });

    // ---- Scroll Mode (active tab only) ------------------------------------

    function enterScrollMode() {
      if (scrollMode) return;
      scrollMode = true;
      scrollBuffer = [];
      scrollBufferBytes = 0;
      updateScrollIndicator();
    }

    function exitScrollMode() {
      if (!scrollMode) return;
      scrollMode = false;
      const tab = getActiveTab();
      if (tab && scrollBuffer.length > 0) {
        let total = 0;
        for (const c of scrollBuffer) total += c.byteLength;
        const merged = new Uint8Array(total);
        let off = 0;
        for (const c of scrollBuffer) { merged.set(new Uint8Array(c), off); off += c.byteLength; }
        scrollBuffer = [];
        scrollBufferBytes = 0;
        tab.term.write(merged, () => tab.term.scrollToBottom());
      } else {
        if (tab) tab.term.scrollToBottom();
      }
      updateScrollIndicator();
    }

    function updateScrollIndicator() {
      const el = document.getElementById('scroll-indicator');
      if (scrollMode) {
        const kb = (scrollBufferBytes / 1024).toFixed(1);
        el.innerHTML = '\u23F8 SCROLL MODE \u2014 '
          + scrollBuffer.length + ' chunk(s), ' + kb + ' KB buffered \u2014 '
          + '<kbd>Esc</kbd> / <kbd>q</kbd> to resume';
        el.style.display = 'block';
      } else {
        el.style.display = 'none';
      }
    }

    // ---- Connect / New buttons -------------------------------------------

    btnConnect.addEventListener('click', () => {
      const tab = getActiveTab();
      if (tab && tab.sessionExists) attachActiveSession();
      else startActiveSession(false);
    });
    btnNew.addEventListener('click', () => startActiveSession(true));

    // ---- Resize -----------------------------------------------------------

    new ResizeObserver(() => {
      for (const tab of tabConns.values()) {
        tab.fitAddon.fit();
        tabSend(tab, { type: 'resize', cols: tab.term.cols, rows: tab.term.rows });
      }
    }).observe(termContainer);

    // ---- Init -------------------------------------------------------------

    const params = new URLSearchParams(location.search);
    const initTargetId = params.get('targetId');
    const cdpHost = params.get('host') || '127.0.0.1';
    const cdpPort = params.get('port') || '9292';

    async function init() {
      updateAxButton();

      const [winsResp, projResp] = await Promise.all([
        fetch(`/api/windows?host=${cdpHost}&port=${cdpPort}`).then(r => r.json()).catch(() => ({ windows: [] })),
        fetch('/api/claude/projects').then(r => r.json()).catch(() => []),
      ]);

      windowList = winsResp.windows || [];
      projectList = projResp;

      if (!windowList.length) {
        showOverlay('No Cursor windows found (CDP)', '', false);
        btnConnect.style.display = 'none';
        btnNew.style.display = 'none';
        return;
      }

      for (const win of windowList) {
        const tab = new TabConnection(win.targetId, win);
        tabConns.set(win.targetId, tab);
        openTabWs(tab);
      }

      const target = initTargetId
        ? windowList.find(w => w.targetId === initTargetId) || windowList[0]
        : windowList[0];

      selectTab(target.targetId);
    }

    init();

    setInterval(() => {
      for (const tab of tabConns.values()) {
        if (tab.sessionAlive) checkTabApprove(tab);
      }
    }, 500);
  </script>
</body>
</html>
