<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cursor Auto</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2a3a55" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cursor Auto" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; line-height: 1.4; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    @media (max-width: 600px) {
      body { margin: 12px; }
      button { padding: 12px 16px; font-size: 14px; min-height: 44px; }
      input, select, textarea { font-size: 16px !important; min-height: 44px; }
      .row { gap: 8px; }
      .card { padding: 12px; }
      h2 { font-size: 18px; }
      .win-tab { padding: 10px 12px; font-size: 12px; }
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc; background: #f7f7f7; cursor: pointer; }
    button:hover { background: #efefef; }
    input { padding: 8px 10px; border-radius: 10px; border: 1px solid #ccc; }
    pre { background: #0b0b0b; color: #eaeaea; padding: 12px; border-radius: 12px; overflow: auto; }
    .hint { color: #666; font-size: 13px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 14px; }
    a { color: #0b66c3; }
    #liveWrap::-webkit-scrollbar { width: 10px; height: 10px; }
    #liveWrap::-webkit-scrollbar-track { background: rgba(30,30,30,.6); border-radius: 5px; }
    #liveWrap::-webkit-scrollbar-thumb { background: #3b7dd8; border-radius: 5px; }
    #liveWrap::-webkit-scrollbar-thumb:hover { background: #5a9bf0; }
    #liveWrap { scrollbar-color: #3b7dd8 rgba(30,30,30,.6); }

    @keyframes axSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .ax-bar { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:10px; transition: background .2s, border-color .2s; border:1px solid rgba(158,158,158,0.25); background:rgba(158,158,158,0.08); }
    .ax-spinner { width:16px; height:16px; border-radius:50%; box-sizing:border-box; flex-shrink:0; border:2.5px solid rgba(0,0,0,0.1); border-top-color:#9e9e9e; animation:axSpin 1.5s linear infinite; }
    .ax-label { font-size:13px; font-weight:500; color:#333; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ax-meta { font-size:11px; color:#888; margin-left:auto; white-space:nowrap; flex-shrink:0; }
    .ax-bar[data-ax-state="scanning"] { background:rgba(229,57,53,0.08); border-color:rgba(229,57,53,0.25); }
    .ax-bar[data-ax-state="scanning"] .ax-spinner { border-top-color:#e53935; animation-duration:1s; }
    .ax-bar[data-ax-state="shimmer"] { background:rgba(251,140,0,0.08); border-color:rgba(251,140,0,0.25); }
    .ax-bar[data-ax-state="shimmer"] .ax-spinner { border-top-color:#fb8c00; animation-duration:0.8s; }
    .ax-bar[data-ax-state="clicked"] { background:rgba(67,160,71,0.08); border-color:rgba(67,160,71,0.25); }
    .ax-bar[data-ax-state="clicked"] .ax-spinner { border-top-color:#43a047; animation-duration:0.6s; }
    .ax-bar[data-ax-state="generating"] { background:rgba(67,160,71,0.08); border-color:rgba(67,160,71,0.25); }
    .ax-bar[data-ax-state="generating"] .ax-spinner { border-top-color:#43a047; animation-duration:1.2s; }
    .ax-bar[data-ax-state="paused"] { background:rgba(120,144,156,0.08); border-color:rgba(120,144,156,0.25); }
    .ax-bar[data-ax-state="paused"] .ax-spinner { border-top-color:#90a4ae; animation:none; }
    .ax-bar[data-ax-state="stopped"] { background:rgba(158,158,158,0.05); border-color:rgba(158,158,158,0.2); }
    .ax-bar[data-ax-state="stopped"] .ax-spinner { border-top-color:#bbb; animation:none; }
    .ax-bar[data-ax-state="dead"] { background:rgba(229,57,53,0.05); border-color:rgba(229,57,53,0.2); }
    .ax-bar[data-ax-state="dead"] .ax-spinner { border-top-color:#e53935; animation:none; }
    .ax-bar[data-ax-state="lost"] { background:rgba(229,57,53,0.05); border-color:rgba(229,57,53,0.2); }
    .ax-bar[data-ax-state="lost"] .ax-spinner { border-top-color:#e53935; animation:none; }
    button:disabled { opacity:.45; cursor:default; }
    button:disabled:hover { background:#f7f7f7; }

    .win-tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:2px solid #e0e0e0; flex-wrap:wrap; }
    .win-tab { padding:8px 16px; cursor:pointer; border:1px solid transparent; border-bottom:none; border-radius:10px 10px 0 0; background:#f7f7f7; font-size:13px; font-weight:500; color:#555; display:flex; align-items:center; gap:6px; transition:background .15s; user-select:none; }
    .win-tab:hover { background:#efefef; }
    .win-tab.active { background:#fff; border-color:#ddd; color:#111; position:relative; }
    .win-tab.active::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:#fff; }
    .win-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; background:#bbb; }
    .win-dot[data-st="scanning"] { background:#e53935; }
    .win-dot[data-st="shimmer"] { background:#fb8c00; }
    .win-dot[data-st="clicked"],.win-dot[data-st="generating"] { background:#43a047; }
    .win-dot[data-st="paused"] { background:#90a4ae; }
    .win-dot[data-st="init"] { background:#9e9e9e; }
  </style>
</head>
<body>
  <div class="win-tabs" id="winTabs"></div>
  <div class="row" style="margin-top:0;margin-bottom:12px">
    <button id="btnChatViewTop" style="padding:8px 16px;border-radius:10px;border:1px solid #3b7dd8;background:#2a3a55;color:#ddd;cursor:pointer;font-weight:500">Chat View</button>
    <button id="btnFileViewTop" style="padding:8px 16px;border-radius:10px;border:1px solid #3b7dd8;background:#2a3a55;color:#ddd;cursor:pointer;font-weight:500">File View</button>
  </div>

  <div class="card">
    <div class="row" style="align-items:center">
      <strong>Auto Click</strong>
      <span id="axSource" class="hint"></span>
    </div>
    <div id="axBar" class="ax-bar" data-ax-state="stopped" style="margin:6px 0">
      <div class="ax-spinner"></div>
      <span class="ax-label" id="axLabel">stopped</span>
      <span class="ax-meta" id="axMeta"></span>
    </div>
    <div class="row">
      <button id="btnAxStartWatch">Start Watch</button>
      <button id="btnAxStartScan">Start Scan</button>
      <button id="btnAxStop" disabled>Stop</button>
      <button id="btnAxPause" disabled>Pause</button>
      <button id="btnAxMode" disabled title="Switch watch/scan mode">W/S</button>
      <button id="btnClick">Click Once</button>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <div class="row" style="align-items:center">
      <strong>Window Size</strong>
      <button class="resizeBtn" data-w="1280" data-h="800">1280×800</button>
      <button class="resizeBtn" data-w="1920" data-h="1080">1920×1080</button>
      <button class="resizeBtn" data-w="2560" data-h="1440">2560×1440</button>
      <label>W <input id="resizeW" size="5" placeholder="width" /></label>
      <label>H <input id="resizeH" size="5" placeholder="height" /></label>
      <button id="btnResizeCustom">Apply</button>
      <button id="btnResizeMax">Maximize</button>
      <button id="btnFitClient">Fit Client</button>
      <span id="winInfo" class="hint"></span>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <div class="row" style="align-items:center">
      <strong>Composer Input</strong>
      <label><input type="checkbox" id="composerAppend" checked /> Append</label>
      <span id="composerStatus" class="hint"></span>
    </div>
    <div style="margin:6px 0">
      <textarea id="composerText" rows="4" placeholder="输入要发送到 Cursor Composer 的内容（支持多行）"
        style="width:100%;box-sizing:border-box;padding:8px 10px;border-radius:10px;border:1px solid #ccc;font-family:inherit;font-size:14px;resize:vertical"></textarea>
    </div>
    <div class="row">
      <button id="btnComposerInsert">Insert</button>
      <button id="btnComposerSend">Send (Enter)</button>
      <button id="btnComposerInsertSend" style="background:#e3f0ff;border-color:#8bb8f0">Insert &amp; Send</button>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <div class="row" style="align-items:center">
      <strong>Live View</strong>
      <label>Refresh
        <select id="liveRefreshSec">
          <option value="1">1s</option>
          <option value="2">2s</option>
          <option value="3" selected>3s</option>
          <option value="5">5s</option>
          <option value="8">8s</option>
          <option value="10">10s</option>
          <option value="0">Manual</option>
        </select>
      </label>
      <button id="btnLiveStart">Start Live</button>
      <button id="btnLiveStop">Stop Live</button>
      <button id="btnLiveRefresh">Refresh Now</button>
      <label>Overflow
        <select id="liveOverflow">
          <option value="hidden">Hidden</option>
          <option value="auto" selected>Auto</option>
          <option value="scroll">Scroll</option>
        </select>
      </label>
      <label>Height
        <select id="liveHeight">
          <option value="400">400px</option>
          <option value="600" selected>600px</option>
          <option value="800">800px</option>
          <option value="full">Full</option>
        </select>
      </label>
      <label>Scale <input id="liveScale" type="number" min="0.1" max="3" step="0.1" value="1" style="width:55px" /></label>
      <span id="liveStatus" class="hint">stopped</span>
    </div>
    <div id="liveWrap" style="position:relative;width:100%;height:600px;margin-top:8px;display:none;overflow:auto;border:1px solid #ccc;border-radius:12px;background:#1e1e1e">
      <iframe id="liveFrame0"
        style="display:block;border:none;background:#1e1e1e;min-width:100%;min-height:100%"
        sandbox="allow-scripts allow-same-origin"
      ></iframe>
      <iframe id="liveFrame1"
        style="position:absolute;top:0;left:0;border:none;background:#1e1e1e;visibility:hidden"
        sandbox="allow-scripts allow-same-origin"
      ></iframe>
    </div>
  </div>

  <h2>Output</h2>
  <pre id="log"></pre>

<script>
  const logEl = document.getElementById('log');
  const urlParams = new URLSearchParams(window.location.search);
  const DASHBOARD_HOST = urlParams.get('host') || '127.0.0.1';
  const DASHBOARD_PORT = Number(urlParams.get('port') || 9292);
  const DASHBOARD_TOKEN = urlParams.get('token') || '';
  const INITIAL_TARGET_ID = urlParams.get('targetId') || '';

  function log(obj) {
    logEl.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
  }

  function basePayload(extra = {}) {
    return {
      host: DASHBOARD_HOST,
      port: DASHBOARD_PORT,
      ...extra,
    };
  }

  function authHeaders() {
    return DASHBOARD_TOKEN ? { 'x-token': DASHBOARD_TOKEN } : {};
  }

  async function post(url, body) {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'content-type': 'application/json', ...authHeaders() },
      body: JSON.stringify(body),
    });
    return await r.json();
  }

  // --- Window Tabs ---
  const winTabsEl = document.getElementById('winTabs');
  let selectedTargetId = INITIAL_TARGET_ID;
  let knownWindows = [];

  function buildSubviewUrl(path) {
    const qs = new URLSearchParams({
      host: DASHBOARD_HOST,
      port: String(DASHBOARD_PORT),
    });
    if (DASHBOARD_TOKEN) qs.set('token', DASHBOARD_TOKEN);
    if (selectedTargetId) qs.set('targetId', selectedTargetId);
    return path + '?' + qs.toString();
  }

  function renderWindowTabs() {
    winTabsEl.innerHTML = '';
    for (const w of knownWindows) {
      const tab = document.createElement('div');
      tab.className = 'win-tab' + (w.targetId === selectedTargetId ? ' active' : '');
      const dot = document.createElement('span');
      dot.className = 'win-dot';
      const ind = w.indicator || {};
      const alive = ind.exists && ind.hbAgeMs < 15000;
      dot.dataset.st = alive ? (ind.state || 'init') : '';
      tab.appendChild(dot);
      tab.appendChild(document.createTextNode(w.project));
      tab.onclick = () => { selectedTargetId = w.targetId; renderWindowTabs(); };
      winTabsEl.appendChild(tab);
    }
  }

  let serverFailCount = 0;
  const SERVER_FAIL_THRESHOLD = 2;

  function onServerReachable() {
    serverFailCount = 0;
  }
  function onServerUnreachable() {
    serverFailCount++;
    if (serverFailCount >= SERVER_FAIL_THRESHOLD) {
      showLostConnection();
      knownWindows = [];
      renderWindowTabs();
    }
  }

  async function refreshWindows() {
    try {
      const qs = new URLSearchParams({ host: DASHBOARD_HOST, port: String(DASHBOARD_PORT) });
      const r = await fetch('/api/windows?' + qs, { headers: authHeaders() }).then(r => r.json());
      if (r.ok && r.windows) {
        onServerReachable();
        knownWindows = r.windows;
        if (!selectedTargetId && knownWindows.length > 0) {
          selectedTargetId = knownWindows[0].targetId;
        }
        if (selectedTargetId && !knownWindows.find(w => w.targetId === selectedTargetId)) {
          selectedTargetId = knownWindows.length > 0 ? knownWindows[0].targetId : '';
        }
        renderWindowTabs();
      }
    } catch {
      onServerUnreachable();
    }
  }

  refreshWindows();
  setInterval(refreshWindows, 5000);

  // --- Chat View button (top, below window tabs) ---
  document.getElementById('btnChatViewTop').onclick = () => window.open(buildSubviewUrl('/chat-view.html'), '_blank');
  document.getElementById('btnFileViewTop').onclick = () => window.open(buildSubviewUrl('/file-view.html'), '_blank');

  // --- Auto Click control panel ---
  const axBar = document.getElementById('axBar');
  const axLabel = document.getElementById('axLabel');
  const axMeta = document.getElementById('axMeta');
  const axSource = document.getElementById('axSource');
  const btnAxStartWatch = document.getElementById('btnAxStartWatch');
  const btnAxStartScan = document.getElementById('btnAxStartScan');
  const btnAxStop = document.getElementById('btnAxStop');
  const btnAxPause = document.getElementById('btnAxPause');
  const btnAxMode = document.getElementById('btnAxMode');
  const btnClick = document.getElementById('btnClick');

  let axState = { exists: false };

  function showLostConnection() {
    axState = { exists: false };
    axBar.dataset.axState = 'lost';
    axLabel.textContent = 'lost connection';
    axMeta.textContent = '';
    axSource.textContent = '';
    btnAxStartWatch.disabled = true;
    btnAxStartScan.disabled = true;
    btnAxStop.disabled = true;
    btnAxPause.disabled = true;
    btnAxPause.textContent = 'Pause';
    btnAxMode.disabled = true;
    btnAxMode.textContent = 'W/S';
    btnClick.disabled = true;
  }

  function updateAxUI(ind) {
    axState = ind;
    const alive = ind.exists && ind.hbAgeMs < 15000;
    const dead = ind.exists && ind.hbAgeMs >= 15000;

    let displayState;
    if (!ind.exists) displayState = 'stopped';
    else if (dead) displayState = 'dead';
    else displayState = ind.state || 'init';

    axBar.dataset.axState = displayState;
    axLabel.textContent = !ind.exists ? 'stopped' : dead ? 'disconnected' : (ind.label || ind.state || 'unknown');

    if (!ind.exists) {
      axMeta.textContent = '';
      axSource.textContent = '';
    } else if (dead) {
      axMeta.textContent = 'hb ' + Math.round(ind.hbAgeMs / 1000) + 's ago';
      axSource.textContent = '';
    } else {
      axMeta.textContent = ind.mode + (ind.paused ? ' (paused)' : '') + ' | hb ' + Math.round(ind.hbAgeMs / 1000) + 's ago';
    }

    const running = alive;
    const paused = alive && ind.paused;

    btnAxStartWatch.disabled = running;
    btnAxStartScan.disabled = running;
    btnAxStop.disabled = !running && !dead;
    btnAxPause.disabled = !running;
    btnAxPause.textContent = paused ? 'Resume' : 'Pause';
    btnAxMode.disabled = !running;
    btnAxMode.textContent = running ? (ind.mode === 'scan' ? 'S\u2192W' : 'W\u2192S') : 'W/S';
    btnClick.disabled = false;
  }

  let axPollTimer = null;
  async function pollAx() {
    try {
      const qs = new URLSearchParams({ host: DASHBOARD_HOST, port: String(DASHBOARD_PORT) });
      if (selectedTargetId) qs.set('targetId', selectedTargetId);
      const r = await fetch('/api/click/indicator?' + qs, { headers: authHeaders() }).then(r => r.json());
      if (r.ok) updateAxUI(r);
      if (r.source) axSource.textContent = '(' + r.source + ')';
    } catch {
      onServerUnreachable();
    }
  }

  async function pollAxWithStatus() {
    try {
      const qs = new URLSearchParams({ host: DASHBOARD_HOST, port: String(DASHBOARD_PORT) });
      if (selectedTargetId) qs.set('targetId', selectedTargetId);
      const r = await fetch('/api/click/status?' + qs, { headers: authHeaders() }).then(r => r.json());
      onServerReachable();
      if (r.ok && r.indicator) {
        updateAxUI(r.indicator);
        if (r.source) axSource.textContent = '(' + r.source + ')';
        if (r.active && (r.stdoutTail || r.stderrTail)) {
          const combined = (r.stderrTail || '') ? (r.stderrTail + '\n' + (r.stdoutTail || '')) : (r.stdoutTail || '');
          if (combined.trim()) logEl.textContent = combined;
        }
      }
    } catch {
      onServerUnreachable();
    }
  }

  pollAxWithStatus();
  axPollTimer = setInterval(pollAxWithStatus, 1500);

  btnAxStartWatch.onclick = async () => {
    log('Starting watch...');
    const r = await post('/api/click/start', basePayload({ mode: 'watch' }));
    log(r);
    if (r.ok) setTimeout(pollAx, 1000);
  };
  btnAxStartScan.onclick = async () => {
    log('Starting scan...');
    const r = await post('/api/click/start', basePayload({ mode: 'scan' }));
    log(r);
    if (r.ok) setTimeout(pollAx, 1000);
  };
  btnAxStop.onclick = async () => {
    log('Stopping...');
    const r = await post('/api/click/stop', basePayload());
    log(r);
    setTimeout(pollAx, 500);
  };
  btnAxPause.onclick = async () => {
    const nextPaused = !(axState.exists && axState.paused);
    const r = await post('/api/click/pause', basePayload({ paused: nextPaused }));
    log(r);
    if (r.ok) setTimeout(pollAx, 300);
  };
  btnAxMode.onclick = async () => {
    const nextMode = (axState.mode === 'scan') ? 'watch' : 'scan';
    const r = await post('/api/click/mode', basePayload({ mode: nextMode }));
    log(r);
    if (r.ok) setTimeout(pollAx, 300);
  };

  document.getElementById('btnClick').onclick = async () => {
    log('Running...');
    const r = await post('/api/click', basePayload());
    log(r);
  };

  const liveWrapEl   = document.getElementById('liveWrap');
  const liveFrames   = [document.getElementById('liveFrame0'), document.getElementById('liveFrame1')];
  const liveStatusEl = document.getElementById('liveStatus');
  const liveRefreshSel = document.getElementById('liveRefreshSec');
  let liveTimer = null;
  let liveRunning = false;
  let liveActiveIdx = 0;
  let liveInflight = false;
  let livePendingRefresh = false;

  function buildLiveUrl() {
    const qs = new URLSearchParams({
      host: DASHBOARD_HOST,
      port: String(DASHBOARD_PORT),
      t: Date.now(),
    });
    if (selectedTargetId) qs.set('targetId', selectedTargetId);
    if (DASHBOARD_TOKEN) qs.set('token', DASHBOARD_TOKEN);
    return '/api/live?' + qs.toString();
  }

  function scheduleNext() {
    if (!liveRunning) return;
    const sec = Number(liveRefreshSel.value);
    if (sec > 0) {
      liveTimer = setTimeout(doLiveRefresh, sec * 1000);
    }
  }

  function doLiveRefresh() {
    if (liveTimer) { clearTimeout(liveTimer); liveTimer = null; }
    if (liveInflight) {
      livePendingRefresh = true;
      return;
    }
    liveInflight = true;
    livePendingRefresh = false;
    liveWrapEl.style.display = 'block';

    const nextIdx   = 1 - liveActiveIdx;
    const nextFrame = liveFrames[nextIdx];
    const curFrame  = liveFrames[liveActiveIdx];

    // Preload in hidden absolute-positioned frame (keep large size so content renders fully)
    nextFrame.style.position = 'absolute';
    nextFrame.style.top = '0';
    nextFrame.style.left = '0';
    nextFrame.style.visibility = 'hidden';
    nextFrame.style.width = curFrame.style.width || '4000px';
    nextFrame.style.height = curFrame.style.height || '4000px';
    const fetchStart = performance.now();
    nextFrame.src = buildLiveUrl();
    liveStatusEl.textContent = 'loading\u2026';

    // Save scroll position from wrapper
    const savedScrollTop = liveWrapEl.scrollTop;
    const savedScrollLeft = liveWrapEl.scrollLeft;

    nextFrame.onload = () => {
      const loadMs = (performance.now() - fetchStart) | 0;
      liveInflight = false;

      // Measure actual content dimensions from .monaco-workbench (has explicit pixel size)
      try {
        const doc = nextFrame.contentDocument;
        if (doc) {
          doc.documentElement.style.overflow = 'hidden';
          doc.body.style.overflow = 'hidden';
          const wb = doc.querySelector('.monaco-workbench');
          const cw = wb ? wb.offsetWidth : (doc.documentElement.scrollWidth || doc.body.scrollWidth);
          const ch = wb ? wb.offsetHeight : (doc.documentElement.scrollHeight || doc.body.scrollHeight);
          if (cw > 0) nextFrame.style.width = cw + 'px';
          if (ch > 0) nextFrame.style.height = ch + 'px';
        }
      } catch {}

      // Build structural path: array of child indices from documentElement to el
      function getPath(el) {
        const path = [];
        let node = el;
        while (node && node.parentElement) {
          path.unshift(Array.prototype.indexOf.call(node.parentElement.children, node));
          node = node.parentElement;
        }
        return path;
      }
      function getByPath(doc, path) {
        let node = doc.documentElement;
        for (const idx of path) {
          if (!node || !node.children || !node.children[idx]) return null;
          node = node.children[idx];
        }
        return node;
      }

      // Read internal scroll positions from CURRENT frame before swap
      const internalScrolls = [];
      try {
        const curDoc = curFrame.contentDocument;
        if (curDoc) {
          curDoc.querySelectorAll('*').forEach(el => {
            if ((el.scrollTop > 0 || el.scrollLeft > 0) && el.clientHeight > 0) {
              internalScrolls.push({ path: getPath(el), scrollTop: el.scrollTop, scrollLeft: el.scrollLeft });
            }
          });
        }
      } catch {}

      // Swap: hide old first, then show new
      curFrame.onload = null;
      curFrame.style.visibility = 'hidden';
      curFrame.style.position = 'absolute';
      curFrame.src = 'about:blank';
      nextFrame.style.position = 'static';
      nextFrame.style.visibility = 'visible';
      liveActiveIdx = nextIdx;

      // Restore wrapper scroll position
      liveWrapEl.scrollTop = savedScrollTop;
      liveWrapEl.scrollLeft = savedScrollLeft;

      // Restore internal scroll positions via structural path
      if (internalScrolls.length) {
        try {
          const newDoc = nextFrame.contentDocument;
          if (newDoc) {
            for (const s of internalScrolls) {
              const el = getByPath(newDoc, s.path);
              if (!el) continue;
              if (el.scrollHeight > el.clientHeight) el.scrollTop = s.scrollTop;
              if (el.scrollWidth > el.clientWidth) el.scrollLeft = s.scrollLeft;
            }
          }
        } catch {}
      }

      liveStatusEl.textContent = 'live at ' + new Date().toLocaleTimeString() + ' (' + loadMs + 'ms)';
      console.log('[live-view] iframe loaded in ' + loadMs + 'ms');
      if (livePendingRefresh) {
        doLiveRefresh();
      } else {
        scheduleNext();
      }
    };
  }

  function requestLiveRefresh() {
    doLiveRefresh();
  }

  function startLive() {
    liveRunning = true;
    doLiveRefresh();
  }

  function stopLive() {
    liveRunning = false;
    liveInflight = false;
    livePendingRefresh = false;
    if (liveTimer) { clearTimeout(liveTimer); liveTimer = null; }
    liveFrames.forEach((f, i) => {
      f.onload = null; f.src = 'about:blank';
      f.style.visibility = i === 0 ? 'visible' : 'hidden';
      f.style.position = i === 0 ? 'static' : 'absolute';
      f.style.width = ''; f.style.height = '';
    });
    liveActiveIdx = 0;
    liveWrapEl.style.display = 'none';
    liveStatusEl.textContent = 'stopped';
  }

  window.addEventListener('message', (e) => {
    if (e.data?.type === 'cursor-auto-click-done' && liveRunning) {
      requestLiveRefresh();
    }
    if (e.data?.type === 'cursor-auto-scroll') {
      liveWrapEl.scrollTop += (e.data.deltaY || 0);
      liveWrapEl.scrollLeft += (e.data.deltaX || 0);
    }
  });

  document.getElementById('btnLiveStart').onclick = startLive;
  document.getElementById('btnLiveStop').onclick = stopLive;
  document.getElementById('btnLiveRefresh').onclick = requestLiveRefresh;

  // --- Overflow & height controls (on wrapper, not iframe) ---
  const liveOverflowSel = document.getElementById('liveOverflow');
  const liveHeightSel = document.getElementById('liveHeight');

  liveOverflowSel.onchange = () => { liveWrapEl.style.overflow = liveOverflowSel.value; };
  liveHeightSel.onchange = () => {
    const v = liveHeightSel.value;
    liveWrapEl.style.height = v === 'full' ? '90vh' : v + 'px';
  };

  const liveScaleEl = document.getElementById('liveScale');
  function applyScale() {
    const s = parseFloat(liveScaleEl.value) || 1;
    liveFrames.forEach(f => {
      f.style.transform = s === 1 ? '' : 'scale(' + s + ')';
      f.style.transformOrigin = 'top left';
      f.style.width = s === 1 ? '100%' : (100 / s) + '%';
      f.style.height = s === 1 ? '100%' : (100 / s) + '%';
    });
  }
  liveScaleEl.onchange = applyScale;
  liveScaleEl.oninput = applyScale;

  // --- Composer input controls ---
  const composerTextEl = document.getElementById('composerText');
  const composerAppendEl = document.getElementById('composerAppend');
  const composerStatusEl = document.getElementById('composerStatus');

  async function composerInsert(send) {
    const text = composerTextEl.value;
    if (!text && !send) return;
    composerStatusEl.textContent = 'inserting…';
    try {
      const r = await post('/api/composer/insert', {
        ...basePayload(),
        text,
        append: composerAppendEl.checked,
        send,
        targetId: selectedTargetId,
      });
      composerStatusEl.textContent = r.ok
        ? (send ? 'sent ✓' : 'inserted ✓') + ' (' + r.lines + ' lines)'
        : 'error: ' + (r.error || 'unknown');
      log(r);
    } catch (e) {
      composerStatusEl.textContent = 'error';
      log({ error: String(e) });
    }
  }

  document.getElementById('btnComposerInsert').onclick = () => composerInsert(false);
  document.getElementById('btnComposerInsertSend').onclick = () => composerInsert(true);
  document.getElementById('btnComposerSend').onclick = async () => {
    composerStatusEl.textContent = 'sending…';
    try {
      const r = await post('/api/composer/send', {
        ...basePayload(),
        targetId: selectedTargetId,
      });
      composerStatusEl.textContent = r.ok ? 'sent ✓' : 'error: ' + (r.error || 'unknown');
      log(r);
    } catch (e) {
      composerStatusEl.textContent = 'error';
      log({ error: String(e) });
    }
  };

  // --- Window resize controls ---
  const winInfoEl = document.getElementById('winInfo');

  async function doResize(body) {
    log('Resizing...');
    const r = await post('/api/resize', { ...basePayload(), ...body });
    log(r);
    if (r?.ok) {
      try {
        const info = await fetch('/api/resize/info?' + new URLSearchParams({ host: DASHBOARD_HOST, port: String(DASHBOARD_PORT) }), { headers: authHeaders() }).then(r => r.json());
        if (info?.ok) {
          updateWinInfo(info.win32 || info.after || info.web || info);
          return;
        }
      } catch {}
    }
    updateWinInfo(r?.after);
  }

  function updateWinInfo(info) {
    if (!info) return;
    const width = info.width ?? info.outerWidth;
    const height = info.height ?? info.outerHeight;
    if (width == null || height == null) return;
    const max = (info.maximized || info.zoomed) ? ' (maximized)' : '';
    const dpr = info.devicePixelRatio ? ' dpr=' + info.devicePixelRatio : '';
    winInfoEl.textContent = width + '×' + height + max + dpr;
  }

  const resizeWEl = document.getElementById('resizeW');
  const resizeHEl = document.getElementById('resizeH');
  document.querySelectorAll('.resizeBtn').forEach(btn => {
    btn.onclick = () => { resizeWEl.value = btn.dataset.w; resizeHEl.value = btn.dataset.h; };
  });
  document.getElementById('btnResizeCustom').onclick = () => {
    const w = Number(resizeWEl.value);
    const h = Number(resizeHEl.value);
    if (w > 0 || h > 0) doResize({ width: w || undefined, height: h || undefined });
  };
  document.getElementById('btnResizeMax').onclick = () => doResize({ maximize: true });
  document.getElementById('btnFitClient').onclick = () => {
    resizeWEl.value = liveWrapEl.clientWidth;
    resizeHEl.value = liveWrapEl.clientHeight;
  };

  // Fetch initial window info
  fetch('/api/resize/info?' + new URLSearchParams({ host: DASHBOARD_HOST, port: String(DASHBOARD_PORT) }), { headers: authHeaders() })
    .then(r => r.json()).then(d => { if (d?.ok) updateWinInfo(d.win32 || d.after || d.web || d); }).catch(() => {});

  // --- Service Worker registration ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
